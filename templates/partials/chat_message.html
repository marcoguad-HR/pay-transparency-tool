{% if role == "user" %}
<!-- Bolla utente — destra, sfondo blu -->
<div class="flex justify-end">
    <div class="max-w-[85%] md:max-w-md bg-blue-600 text-white rounded-2xl rounded-tr-sm px-4 py-3 shadow-sm">
        <p class="text-sm whitespace-pre-wrap">{{ text }}</p>
        <p class="text-xs text-blue-200 mt-1 text-right">{{ timestamp }}</p>
    </div>
</div>
{% else %}
<!-- Bolla assistente — sinistra, sfondo grigio -->
<div class="flex justify-start">
    <div class="max-w-[85%] md:max-w-md bg-gray-100 text-gray-900 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
        <p class="text-sm whitespace-pre-wrap">{{ text }}</p>
        <p class="text-xs text-gray-500 mt-1 text-right">{{ timestamp }}</p>
    </div>
</div>
{% endif %}
