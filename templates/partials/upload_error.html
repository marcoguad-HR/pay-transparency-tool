<!-- Bolla errore upload — sinistra, sfondo rosso chiaro -->
<div class="flex justify-start">
    <div class="max-w-[85%] md:max-w-md bg-red-50 text-red-900 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm border border-red-200">
        <div class="flex items-start gap-2">
            <!-- Icona errore -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
            <div class="flex-1">
                <p class="text-xs font-semibold text-red-700 mb-0.5">Errore nel caricamento</p>
                <p class="text-sm whitespace-pre-wrap">{{ error }}</p>
            </div>
        </div>
    </div>
</div>
